<svg viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Medium solid-timber chicken coop with corrugated metal roof and wooden access ramp">
  <!-- Sky -->
  <rect width="480" height="300" fill="#c4dbe8"/>
  <!-- Ground -->
  <rect x="0" y="246" width="480" height="54" fill="#6a8f47"/>
  <rect x="0" y="242" width="480" height="7" fill="#7ea854"/>
  <!-- Shadow -->
  <ellipse cx="238" cy="249" rx="145" ry="6" fill="rgba(0,0,0,0.18)"/>

  <!-- Back legs -->
  <rect x="131" y="200" width="13" height="48" fill="#4a2c0c" rx="2"/>
  <rect x="333" y="200" width="13" height="48" fill="#4a2c0c" rx="2"/>
  <!-- Front legs -->
  <rect x="113" y="198" width="16" height="50" fill="#6b3f16" rx="2"/>
  <rect x="348" y="198" width="16" height="50" fill="#6b3f16" rx="2"/>

  <!-- Body walls -->
  <rect x="107" y="96" width="263" height="104" fill="#c27e28" rx="3"/>
  <!-- Plank lines -->
  <line x1="107" y1="111" x2="370" y2="111" stroke="#9a6118" stroke-width="1.5" opacity="0.65"/>
  <line x1="107" y1="125" x2="370" y2="125" stroke="#9a6118" stroke-width="1.5" opacity="0.65"/>
  <line x1="107" y1="139" x2="370" y2="139" stroke="#9a6118" stroke-width="1.5" opacity="0.65"/>
  <line x1="107" y1="153" x2="370" y2="153" stroke="#9a6118" stroke-width="1.5" opacity="0.65"/>
  <line x1="107" y1="167" x2="370" y2="167" stroke="#9a6118" stroke-width="1.5" opacity="0.65"/>
  <line x1="107" y1="181" x2="370" y2="181" stroke="#9a6118" stroke-width="1.5" opacity="0.65"/>
  <line x1="107" y1="188" x2="370" y2="188" stroke="#9a6118" stroke-width="1.5" opacity="0.65"/>

  <!-- Gable (front peak triangle) -->
  <polygon points="239,42 107,96 370,96" fill="#c27e28"/>
  <!-- Gable plank lines -->
  <line x1="152" y1="83" x2="328" y2="83" stroke="#9a6118" stroke-width="1.5" opacity="0.65"/>
  <line x1="177" y1="70" x2="303" y2="70" stroke="#9a6118" stroke-width="1.5" opacity="0.65"/>
  <line x1="203" y1="56" x2="278" y2="56" stroke="#9a6118" stroke-width="1.5" opacity="0.65"/>

  <!-- Roof left slope -->
  <polygon points="239,28 85,98 107,98" fill="#2c2b2b"/>
  <line x1="152" y1="78" x2="89" y2="97" stroke="#484848" stroke-width="3" opacity="0.4"/>
  <line x1="177" y1="65" x2="87" y2="97" stroke="#484848" stroke-width="3" opacity="0.35"/>
  <line x1="205" y1="52" x2="85" y2="98" stroke="#484848" stroke-width="3" opacity="0.3"/>
  <!-- Roof right slope -->
  <polygon points="239,28 391,98 370,98" fill="#262525"/>
  <line x1="280" y1="68" x2="387" y2="97" stroke="#404040" stroke-width="3" opacity="0.35"/>
  <line x1="313" y1="54" x2="390" y2="97" stroke="#404040" stroke-width="3" opacity="0.3"/>
  <!-- Ridge cap -->
  <line x1="83" y1="99" x2="239" y2="28" stroke="#1c1b1b" stroke-width="3.5"/>
  <line x1="239" y1="28" x2="393" y2="99" stroke="#1c1b1b" stroke-width="3.5"/>

  <!-- Arched door -->
  <path d="M 282,200 L 282,143 Q 282,126 298,126 Q 314,126 314,143 L 314,200 Z" fill="#5c3210"/>
  <path d="M 284,199 L 284,145 Q 284,130 298,130 Q 312,130 312,145 L 312,199" fill="none" stroke="#3d2008" stroke-width="1.5" opacity="0.7"/>
  <!-- Hinges -->
  <rect x="278" y="142" width="11" height="7" fill="#111" rx="1.5"/>
  <circle cx="287" cy="145" r="2" fill="#2a2a2a"/>
  <rect x="278" y="172" width="11" height="7" fill="#111" rx="1.5"/>
  <circle cx="287" cy="175" r="2" fill="#2a2a2a"/>
  <rect x="278" y="188" width="11" height="7" fill="#111" rx="1.5"/>
  <!-- Bolt latch -->
  <rect x="314" y="160" width="10" height="5" fill="#111" rx="1"/>

  <!-- Ramp -->
  <polygon points="280,200 316,200 340,248 256,248" fill="#8b5218"/>
  <!-- Ramp cleats -->
  <line x1="262" y1="239" x2="335" y2="233" stroke="#6a3c10" stroke-width="3" stroke-linecap="round"/>
  <line x1="265" y1="226" x2="334" y2="221" stroke="#6a3c10" stroke-width="3" stroke-linecap="round"/>
  <line x1="269" y1="213" x2="327" y2="209" stroke="#6a3c10" stroke-width="3" stroke-linecap="round"/>
  <line x1="273" y1="202" x2="317" y2="200" stroke="#6a3c10" stroke-width="3" stroke-linecap="round"/>

  <!-- Vent window left -->
  <rect x="124" y="113" width="64" height="28" fill="#5c3210" rx="3"/>
  <line x1="124" y1="123" x2="188" y2="123" stroke="#3d2008" stroke-width="1.5"/>
  <line x1="124" y1="132" x2="188" y2="132" stroke="#3d2008" stroke-width="1.5"/>
  <line x1="145" y1="113" x2="145" y2="141" stroke="#3d2008" stroke-width="1" opacity="0.5"/>
  <line x1="165" y1="113" x2="165" y2="141" stroke="#3d2008" stroke-width="1" opacity="0.5"/>

  <!-- Second vent window right side for medium -->
  <rect x="210" y="113" width="46" height="28" fill="#5c3210" rx="3"/>
  <line x1="210" y1="123" x2="256" y2="123" stroke="#3d2008" stroke-width="1.5"/>
  <line x1="210" y1="132" x2="256" y2="132" stroke="#3d2008" stroke-width="1.5"/>
  <line x1="231" y1="113" x2="231" y2="141" stroke="#3d2008" stroke-width="1" opacity="0.5"/>
</svg>
